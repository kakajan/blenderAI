id: workflow.character_blockout
name: Character Blockout
steps:
  - skill: modeling.create_mesh
    prompt: Create a stylized humanoid blockout (head, torso, limbs) as separate named objects, then refine with mesh.ops (extrude/bevel) and SUBSURF/BEVEL modifiers — not raw unedited cubes only.
  - skill: modeling.modify_mesh
    prompt: Refine proportions for a heroic stylized character, keep forms readable.
  - skill: scene.organize
    prompt: Rename and organize all character parts under Character/Blockout.
